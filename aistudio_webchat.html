<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio Webchat — AE Agentic Support</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #0d47a1, #1565c0); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .dot { width: 10px; height: 10px; border-radius: 50%; }
  .header .status { font-size: 12px; opacity: .85; margin-left: auto; }
  .header .info { font-size: 11px; opacity: .6; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 78%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; word-wrap: break-word; white-space: pre-wrap; animation: fadeIn .25s ease; }
  .msg.bot { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .msg.user { background: #1565c0; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
  .msg.system { background: transparent; color: #888; font-size: 12px; text-align: center; align-self: center; }
  .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; align-self: center; font-size: 13px; }
  .msg .label { font-size: 11px; font-weight: 600; opacity: .5; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .typing { align-self: flex-start; padding: 14px 22px; background: white; border-radius: 16px; display: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .typing span { display: inline-block; width: 8px; height: 8px; background: #bbb; border-radius: 50%; margin: 0 2px; animation: bounce .6s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  .input-area { padding: 16px 24px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
  .input-area select { padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 24px; background: white; font-size: 13px; color: #333; }
  .input-area input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
  .input-area input:focus { border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,.15); }
  .input-area button { padding: 12px 28px; background: #1565c0; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
  .input-area button:hover { background: #0d47a1; }
  .input-area button:active { transform: scale(.97); }
  .input-area button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .quick-actions { padding: 8px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-actions button { padding: 6px 14px; border: 1.5px solid #1565c0; background: white; color: #1565c0; border-radius: 16px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .quick-actions button:hover { background: #1565c0; color: white; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div class="header">
  <div class="dot" id="statusDot" style="background:#ffc107"></div>
  <div>
    <h1>AI Studio — Agentic Ops Support</h1>
    <div class="info" id="convInfo">Connecting to Cognibot via WebSocket...</div>
  </div>
  <span class="status" id="statusText">Connecting...</span>
</div>
<div class="chat-area" id="chatArea"></div>
<div class="typing" id="typing"><span></span><span></span><span></span></div>
<div class="quick-actions" id="quickActions">
  <button onclick="sendQuick('Policy_Renewal_Batch workflow is failing')">Policy_Renewal_Batch failing</button>
  <button onclick="sendQuick('Check system health')">System health</button>
  <button onclick="sendQuick('What workflows are having issues?')">Workflow issues</button>
  <button onclick="sendQuick('status')">My open cases</button>
</div>
<div class="input-area">
  <select id="roleSelect" title="Audience role">
    <option value="technical" selected>Technical</option>
    <option value="business">Business</option>
  </select>
  <input type="text" id="msgInput" placeholder="Describe your issue..." disabled>
  <button id="sendBtn" disabled onclick="sendMessage()">Send</button>
</div>

<script>
const COGNIBOT_URL = 'http://localhost:3978';
const WS_URL = 'ws://localhost:3978/v3/directline';
const CLIENT_SECRET = 'secret';

let conversationId = null;
let ws = null;

const chatArea  = document.getElementById('chatArea');
const msgInput  = document.getElementById('msgInput');
const sendBtn   = document.getElementById('sendBtn');
const roleSel   = document.getElementById('roleSelect');
const typingEl  = document.getElementById('typing');
const statusDot = document.getElementById('statusDot');
const statusTxt = document.getElementById('statusText');
const convInfo  = document.getElementById('convInfo');

function addMsg(text, cls, label) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (label) {
    const l = document.createElement('div');
    l.className = 'label';
    l.textContent = label;
    d.appendChild(l);
  }
  const t = document.createElement('span');
  t.textContent = text;
  d.appendChild(t);
  chatArea.appendChild(d);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setStatus(state) {
  const colors = { ok: '#4caf50', warn: '#ffc107', err: '#f44336' };
  const labels = { ok: 'Connected via WebSocket', warn: 'Connecting...', err: 'Disconnected' };
  statusDot.style.background = colors[state];
  statusTxt.textContent = labels[state];
  const ready = state === 'ok';
  msgInput.disabled = !ready;
  sendBtn.disabled = !ready;
}

async function startConversation() {
  try {
    const r = await fetch(COGNIBOT_URL + '/v3/directline/conversations', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + CLIENT_SECRET,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ user: { id: 'webchat_user', name: 'Webchat User' } }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    conversationId = data.conversationId;
    convInfo.textContent = 'Conversation: ' + conversationId;
    connectWebSocket();
  } catch (e) {
    console.error('Failed to start conversation:', e);
    setStatus('err');
    addMsg('Cannot connect to Cognibot. Error: ' + e.message, 'error');
    setTimeout(startConversation, 5000);
  }
}

function connectWebSocket() {
  const wsUrl = WS_URL + '/' + conversationId + '?secret=' + CLIENT_SECRET;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log('WebSocket connected');
    setStatus('ok');
    addMsg('Connected to AI Studio. How can I help with your AutomationEdge workflows?', 'system');
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      console.log('WS full:', JSON.stringify(data));

      const showReply = (text) => {
        typingEl.style.display = 'none';
        addMsg(text, 'bot', 'Ops Agent');
        sendBtn.disabled = false;
        msgInput.disabled = false;
        msgInput.focus();
      };

      const isBotMessage = (act) => {
        if (act.type !== 'message' || !act.text) return false;
        const fromRole = act.from && act.from.role;
        const fromId = act.from && act.from.id;
        if (fromRole === 'bot') return true;
        if (fromId === 'webchat_user') return false;
        return true;
      };

      if (data.activities) {
        for (const act of data.activities) {
          if (isBotMessage(act)) showReply(act.text);
        }
      } else if (data.type === 'message' && data.text) {
        if (isBotMessage(data)) showReply(data.text);
      }
    } catch (e) {
      const raw = event.data;
      console.log('WS non-JSON:', raw);
      if (raw && typeof raw === 'string' && raw.length > 0) {
        typingEl.style.display = 'none';
        addMsg(raw, 'bot', 'Ops Agent');
        sendBtn.disabled = false;
        msgInput.disabled = false;
      }
    }
  };

  ws.onclose = (event) => {
    console.log('WebSocket closed:', event.code, event.reason);
    setStatus('err');
    addMsg('Connection lost. Reconnecting...', 'system');
    setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = (error) => {
    console.error('WebSocket error:', error);
  };
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !conversationId) return;

  addMsg(text, 'user', 'You');
  msgInput.value = '';
  sendBtn.disabled = true;
  msgInput.disabled = true;
  typingEl.style.display = 'block';
  chatArea.scrollTop = chatArea.scrollHeight;

  const activity = {
    type: 'message',
    text: text,
    from: { id: 'webchat_user', name: 'Webchat User' },
    channelId: 'webchat',
    user_type: roleSel.value || 'technical',
    channelData: { user_role: roleSel.value || 'technical' },
  };

  try {
    const r = await fetch(COGNIBOT_URL + '/v3/directline/conversations/' + conversationId + '/activities', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + CLIENT_SECRET,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(activity),
    });
    if (!r.ok) {
      typingEl.style.display = 'none';
      addMsg('Failed to send: HTTP ' + r.status, 'error');
      sendBtn.disabled = false;
      msgInput.disabled = false;
    }
  } catch (e) {
    typingEl.style.display = 'none';
    addMsg('Send failed: ' + e.message, 'error');
    sendBtn.disabled = false;
    msgInput.disabled = false;
  }
}

function sendQuick(text) { msgInput.value = text; sendMessage(); }

msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });

startConversation();
</script>
</body>
</html>
