<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Agentic Support — Webchat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .dot { width: 10px; height: 10px; border-radius: 50%; }
  .header .status { font-size: 12px; opacity: .85; margin-left: auto; }
  .header .session { font-size: 11px; opacity: .6; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 78%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; word-wrap: break-word; white-space: pre-wrap; animation: fadeIn .25s ease; }
  .msg.bot { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .msg.user { background: #1a73e8; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
  .msg.system { background: transparent; color: #888; font-size: 12px; text-align: center; align-self: center; }
  .msg.progress { background: transparent; color: #666; font-size: 13px; align-self: flex-start; padding: 6px 16px; font-style: italic; animation: fadeIn .2s ease; }
  .msg.progress::before { content: '⏳ '; }
  .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; align-self: center; font-size: 13px; }
  .msg .label { font-size: 11px; font-weight: 600; opacity: .5; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .typing { align-self: flex-start; padding: 14px 22px; background: white; border-radius: 16px; display: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .typing span { display: inline-block; width: 8px; height: 8px; background: #bbb; border-radius: 50%; margin: 0 2px; animation: bounce .6s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  .input-area { padding: 16px 24px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
  .input-area select { padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 24px; background: white; font-size: 13px; color: #333; }
  .input-area input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
  .input-area input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
  .input-area button { padding: 12px 28px; background: #1a73e8; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
  .input-area button:hover { background: #1557b0; }
  .input-area button:active { transform: scale(.97); }
  .input-area button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .quick-actions { padding: 8px 24px; display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-actions button { padding: 6px 14px; border: 1.5px solid #1a73e8; background: white; color: #1a73e8; border-radius: 16px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .quick-actions button:hover { background: #1a73e8; color: white; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div class="header">
  <div class="dot" id="statusDot" style="background:#ffc107"></div>
  <div>
    <h1>AutomationEdge Ops Agent</h1>
    <div class="session" id="sessionInfo">Session: checking...</div>
  </div>
  <span class="status" id="statusText">Checking agent...</span>
</div>
<div class="chat-area" id="chatArea"></div>
<div class="typing" id="typing"><span></span><span></span><span></span></div>
<div class="quick-actions" id="quickActions">
  <button onclick="sendQuick('Policy_Renewal_Batch workflow is failing')">Policy_Renewal_Batch failing</button>
  <button onclick="sendQuick('Check system health')">System health</button>
  <button onclick="sendQuick('What workflows are having issues?')">Workflow issues</button>
  <button onclick="sendQuick('status')">My open cases</button>
</div>
<div class="input-area">
  <select id="roleSelect" title="Audience role">
    <option value="technical" selected>Technical</option>
    <option value="business">Business</option>
  </select>
  <input type="text" id="msgInput" placeholder="Describe your issue..." disabled>
  <button id="sendBtn" disabled onclick="sendMessage()">Send</button>
</div>

<script>
const AGENT_URL = '';
const SESSION_ID = 'webchat-' + Date.now().toString(36);

const chatArea  = document.getElementById('chatArea');
const msgInput  = document.getElementById('msgInput');
const sendBtn   = document.getElementById('sendBtn');
const roleSel   = document.getElementById('roleSelect');
const typingEl  = document.getElementById('typing');
const statusDot = document.getElementById('statusDot');
const statusTxt = document.getElementById('statusText');
const sessionEl = document.getElementById('sessionInfo');

sessionEl.textContent = 'Session: ' + SESSION_ID;

function addMsg(text, cls, label) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (label) {
    const l = document.createElement('div');
    l.className = 'label';
    l.textContent = label;
    d.appendChild(l);
  }
  const t = document.createElement('span');
  t.textContent = text;
  d.appendChild(t);
  chatArea.appendChild(d);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setStatus(state) {
  const colors = { ok: '#4caf50', warn: '#ffc107', err: '#f44336' };
  const labels = { ok: 'Connected', warn: 'Checking...', err: 'Disconnected' };
  statusDot.style.background = colors[state];
  statusTxt.textContent = labels[state];
  const ready = state === 'ok';
  msgInput.disabled = !ready;
  sendBtn.disabled = !ready;
}

async function checkHealth() {
  try {
    const r = await fetch(AGENT_URL + '/health', { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      setStatus('ok');
      addMsg('Agent is online. How can I help you with your AutomationEdge workflows?', 'bot', 'Ops Agent');
      return;
    }
  } catch(e) {}
  setStatus('err');
  addMsg('Agent server not reachable at ' + AGENT_URL + '. Make sure agent_server.py is running.', 'error');
  setTimeout(checkHealth, 5000);
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  addMsg(text, 'user', 'You');
  msgInput.value = '';
  sendBtn.disabled = true;
  msgInput.disabled = true;
  typingEl.style.display = 'block';
  chatArea.scrollTop = chatArea.scrollHeight;

  let progressEl = null;

  try {
    const r = await fetch(AGENT_URL + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: SESSION_ID,
        user_id: 'webchat_user',
        user_role: roleSel.value || 'technical'
      })
    });

    if (!r.ok) {
      typingEl.style.display = 'none';
      addMsg('Agent returned HTTP ' + r.status, 'error');
      sendBtn.disabled = false;
      msgInput.disabled = false;
      msgInput.focus();
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const raw = line.slice(6);
          let parsed;
          try { parsed = JSON.parse(raw); } catch { parsed = raw; }

          if (eventType === 'progress') {
            typingEl.style.display = 'none';
            if (progressEl) progressEl.remove();
            progressEl = document.createElement('div');
            progressEl.className = 'msg progress';
            progressEl.textContent = parsed;
            chatArea.appendChild(progressEl);
            chatArea.scrollTop = chatArea.scrollHeight;
          } else if (eventType === 'done') {
            if (progressEl) { progressEl.remove(); progressEl = null; }
            typingEl.style.display = 'none';
            addMsg(parsed || 'No response.', 'bot', 'Ops Agent');
          }
          eventType = '';
        }
      }
    }
  } catch(e) {
    if (progressEl) progressEl.remove();
    typingEl.style.display = 'none';
    addMsg('Request failed: ' + e.message, 'error');
  }
  sendBtn.disabled = false;
  msgInput.disabled = false;
  msgInput.focus();
}

function sendQuick(text) { msgInput.value = text; sendMessage(); }

msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });

checkHealth();
</script>
</body>
</html>
